  # Filter wildlife incident events 
  - name: Filter wildlife incidents 
    id: filter_wildlife_incidents 
    task: filter_row_values
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:  
      df: ${{ workflow.events_temporal.return }}
      column: event_type
      values: 
        - snare_rep
        - fire_rep 
        - wildlife_injury_rep
        - wildlife_treatment_rep
        - wildlife_carcass_rep
  

  # Process event details, normalize and drop_column_prefix -- elephants
  - name: Process elephant event details 
    id: process_elephant_details 
    task: process_events_details 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.filter_elephant_sighting.return }}
      client: ${{ workflow.er_client_name.return }}
      map_to_titles: true 
      ordered: true 

  - name: Normalize elephant event details 
    id: normalize_elephant_details 
    task: normalize_json_column
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.process_elephant_details.return }}
      column: event_details 
      skip_if_not_exists: true 
      sort_columns: true 
  
  - name: Drop elephant events column prefix 
    id: drop_elephant_prefix 
    task: drop_column_prefix
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.normalize_elephant_details.return }}
      prefix: "event_details__"
      duplicate_strategy: "keep_original"

  # Process event details, normalize and drop_column_prefix -- buffalo
