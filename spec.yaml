      prefix: "event_details__"
      duplicate_strategy: "keep_original"

  # Map columns for elephant sighting events 
  - name: Map elephant sighting events 
    id: map_elephant_sighting 
    task: map_columns
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.drop_elephant_prefix.return }}
      drop_columns: [
        "index",
        "time",
        "event_category",
        "reported_by",
        "serial_number",
        "Comments",
        ]
      retain_columns: []
      rename_columns: {
        "Female":"female",
        "Herd Demographic": "herd_composition",
        "Herd size":"herd_size",
        "Male":"male",
        "Subadult":"sub_adult",
        "< 1 year":"underayear",
        }
      raise_if_not_found: true

  - name: Replace missing with label unspecified 
    id: replace_elephant_unspecified
    task: replace_missing_with_label
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.map_elephant_sighting.return }}
      columns: ["herd_composition"]
      label: "Unspecified"
  
  - name: Convert elephant values to integer 
    id: convert_elephant_int 
    task: convert_to_int 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.replace_elephant_unspecified.return }}
      columns: ["herd_size","female","male","sub_adult","underayear"]
      errors: coerce 
      fill_value: 0 
      inplace: false 
  
  - name: Map elephant column values 
    id: map_ele_column_values 
    task: map_column_values
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
